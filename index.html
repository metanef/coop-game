<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Video Games</title>
    <link rel="icon" href="src/img/icon.ico">
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <header>
        <nav>
            <img id="logo" src="src/img/logo.png" alt="W4SD Logo">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="pages/about.html">About</a></li> <!-- Lien vers la page About -->
            </ul>
        </nav>
        <h3 class="intro-title"><div id="intro-title-1">Welcome to W4SD</div><div id="intro-title-2">a local coop game hub</div></h3>
        <div id="header-intro">
            <p class="intro-text">
                Here, you'll find a list of multiplayer and competitive games perfect for fun with friends and family. Whether you're into action, strategy, sports or party games, dive in and discover your new favorite game.
            </p>
        </div>
    </header>
    <main>
        <section id="game-container">
            <h2>Game List</h2>
            <div id="games-list"></div> <!-- Container for games -->
        </section>
    </main>

    <!-- Import du footer -->
    <div id="footer-container"></div> <!-- Conteneur pour le footer -->
    <script>
        // Chargement du footer
        fetch('pages/templates/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
