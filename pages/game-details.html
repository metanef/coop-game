<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details</title>
    <link rel="icon" href="../src/img/icon.ico">
    <link rel="stylesheet" href="../src/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <img id="logo" src="../src/img/logo.png" alt="W4SD Logo">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
        <h3 class="header-title"><div id="header-title-1">Welcome to W4SD</div><div id="header-title-2">a local coop game hub</div></h3>
        <div id="header-intro">
            <p class="intro-text">&copy; 2025 W4SD</p>
        </div>
    </header>
    <main id="game-details-main">
        <!-- Navigation Arrows -->
        <button id="prev-game" class="nav-arrow nav-arrow-prev" aria-label="Previous game">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button id="next-game" class="nav-arrow nav-arrow-next" aria-label="Next game">
            <i class="fas fa-chevron-right"></i>
        </button>

        <section id="game-container">
            <h2 id="game-title"></h2>
            <div class="game-info">
                <p><strong>Players:</strong> <span id="game-players"></span></p>
                <p><strong>Multiplayer:</strong> <span id="multiplayer-type"></span></p>
                <p><strong>Genre:</strong> <span id="game-genre"></span></p>
            </div>
            <p><strong>Release date:</strong> <span id="game-release-date"></span></p>
            <p><strong>Developer:</strong> <span id="game-developer"></span></p>
            <p><strong>Summary:</strong> <span id="game-summary"></span></p>
            <div id="game-screenshots"></div>
            <div class="shop-button-container">
                <a id="shop-link" href="#" target="_blank" class="shop-button">Get the game</a>
            </div>
        </section>
    </main>

    <script type="module" src="../script.js"></script>
</body>
</html>
